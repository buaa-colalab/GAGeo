checkpoint:
  output_dir: ./output
  resume: null
  save_freq: 5
data:
  crop_size: 518
  data_root: /data/GoogleEarth
  img_size: 518
  num_workers: 4
  train_json: /data/xhj/location/data/train.json
  val_json: /data/xhj/location/data/val.json
deepspeed:
  activation_checkpointing: false
  enabled: false
  gradient_accumulation_steps: 1
  offload_optimizer: false
  offload_param: false
  zero_stage: 2
inference:
  score_threshold: 0.5
logging:
  log_freq: 50
  use_tensorboard: true
  use_wandb: false
  val_freq: 1
  wandb_project: cross-view-localization
model:
  dinov2_weights: null
  embed_dim: 1024
  enable_bbox: true
  enable_camera: true
  enable_position: true
  enable_seg: false
  freeze_aggregator: false
  freeze_patch_embed: true
  num_decoder_layers: 6
  num_heads: 16
  vggt_depth: 24
  vggt_weights: null
training:
  batch_size: 4
  grad_clip: 1.0
  lr_backbone: 1.0e-05
  lr_heads: 0.0001
  min_lr: 1.0e-06
  num_epochs: 100
  optimizer: adamw
  scheduler: cosine
  use_amp: true
  warmup_epochs: 5
  weight_bbox: 5.0
  weight_decay: 0.0001
  weight_giou: 2.0
  weight_mask: 1.0
  weight_position: 1.0
  weight_yaw: 1.0
