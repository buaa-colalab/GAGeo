checkpoint:
  output_dir: ./output/test
  resume: null
  save_freq: 1
data:
  crop_size: 518
  data_root: /data/GoogleEarth
  img_size: 518
  num_workers: 0
  train_json: /data/xhj/location/data/test_samples.json
  val_json: /data/xhj/location/data/test_samples.json
logging:
  use_wandb: false
  val_freq: 1
model:
  embed_dim: 1024
  enable_bbox: true
  enable_camera: true
  enable_position: true
  enable_seg: false
  freeze_aggregator: false
  freeze_patch_embed: false
  num_decoder_layers: 6
  num_heads: 16
  vggt_depth: 24
  vggt_weights: null
training:
  batch_size: 1
  gpu: '7'
  grad_clip: 1.0
  lr_backbone: 1.0e-05
  lr_heads: 0.0001
  min_lr: 1.0e-06
  num_epochs: 2
  use_amp: true
  warmup_epochs: 1
  weight_bbox: 5.0
  weight_decay: 0.0001
  weight_giou: 2.0
  weight_mask: 1.0
  weight_position: 1.0
  weight_yaw: 1.0
