# Cross-View Localization Configuration

# Data
data:
  train_json: "/data/xhj/location/data/train.json"
  val_json: "/data/xhj/location/data/val.json"
  data_root: "/data/GoogleEarth"
  img_size: 518
  crop_size: 518
  num_workers: 1  # Reduced from 4 to prevent thread exhaustion with 8 GPUs

# Model
model:
  embed_dim: 1024
  vggt_depth: 24
  num_heads: 16
  num_decoder_layers: 6
  
  # 多任务开关
  enable_bbox: true
  enable_seg: false
  enable_camera: true
  enable_position: true
  
  # 预训练权重 (放在ckpt/目录下便于管理)
  vggt_weights: /data/xhj/location/ckpt/vggt/model.pt  # 例如: ckpt/vggt.pth
  dinov2_weights: null  # 例如: ckpt/dinov2_vitl14_reg.pth
  freeze_patch_embed: true
  freeze_aggregator: false  # Set to false and use DeepSpeed ZeRO for better training

# Training
training:
  batch_size: 8
  gradient_accumulation_steps: 2
  num_epochs: 100
  
  # 学习率
  lr_backbone: 1.0e-5
  lr_heads: 1.0e-4
  weight_decay: 1.0e-4
  
  # Loss权重
  weight_bbox: 5.0
  weight_giou: 2.0
  weight_yaw: 1.0
  weight_position: 1.0
  weight_mask: 1.0
  
  # Optimizer
  optimizer: "adamw"
  
  # Scheduler
  scheduler: "cosine"
  warmup_epochs: 5
  min_lr: 1.0e-6
  
  # 梯度裁剪
  grad_clip: 1.0
  
  # 混合精度训练 (推荐bf16用于RTX 4090)
  use_amp: true
  mixed_precision: bf16  # "bf16" or "fp16"
  gpu: "5,6,7"

# Checkpointing
checkpoint:
  output_dir: "/data/run01/scxi704/xhj/location/output"  # 绝对路径，避免写到有配额限制的home目录
  save_freq: 5
  resume: null

# Logging
logging:
  val_freq: 1  # 每N个epoch验证一次
  vis_freq: 5  # 每N个epoch可视化一次
  num_vis_samples: 10  # 可视化样本数量
  use_tensorboard: true
