# Cross-View Localization Configuration

# Data
data:
  #train_json: "/data/xhj/location/data/single.json"
  train_json: "/data/xhj/location/data/train_all.json"
  #val_json: "/data/xhj/location/data/single.json"
  val_json: "/data/xhj/location/data/val_all.json"
  data_root: "/data/xhj/data/"
  img_size: 518
  crop_size: 518
  num_workers: 0  # Reduced from 4 to prevent thread exhaustion with 8 GPUs
  train_direction: 'both'  # 'mono_to_sat', 'sat_to_mono', 'both' for bidirectional training
  val_direction: 'both'  # 'mono_to_sat', 'sat_to_mono', 'both' for bidirectional training

# Model
model:
  # Pi3 backbone settings
  decoder_size: 'large'  # 'small', 'base', 'large'
  
  # Two-Stage Cross-Attention 参数
  num_intent_queries: 32  # Stage 1: 可学习的Intent Queries数量
  num_object_queries: 10  # Stage 2: Object detection queries数量
  num_location_queries: 16  # Stage 2: Location queries数量
  
  # Transformer 参数
  num_heads: 8  # Attention heads数量 (prompt_fusion和query_decoder共用)
  prompt_fusion_layers: 3  # Stage 1: Intent Formation的decoder层数
  num_decoder_layers: 6  # Stage 2: Query Decoder的decoder层数
  dropout: 0.1  # Dropout rate
  
  # Pi3 预训练权重
  pi3_weights: /data/xhj/location/ckpt/pi3/model.safetensors
  freeze_dinov2: true  # 冻结DINOv2 encoder部分
  freeze_decoder: false  # Pi3 decoder可训练

# Training
training:
  batch_size: 4
  gradient_accumulation_steps: 4
  num_epochs: 20
  
  # 学习率
  lr_backbone: 1.0e-5
  lr_heads: 1.0e-4
  weight_decay: 1.0e-4
  
  # Loss权重
  weight_bbox: 5.0
  weight_giou: 2.0
  weight_yaw: 1.0
  weight_heatmap: 1.0
  
  # Optimizer
  optimizer: "adamw"
  
  # Scheduler
  scheduler: "cosine"
  warmup_epochs: 5
  min_lr: 1.0e-6
  
  # 梯度裁剪
  grad_clip: 1.0
  
  # 混合精度训练 (推荐bf16用于RTX 4090)
  use_amp: true
  mixed_precision: bf16  # "bf16" or "fp16"
  gpu: "0,1,2,3"

# Checkpointing
checkpoint:
  output_dir: "/data/xhj/location/output"  # 绝对路径，避免写到有配额限制的home目录
  save_freq: 5
  resume: null

# Logging
logging:
  val_freq: 1  # 每N个epoch验证一次
  vis_freq: 1  # 每N个epoch可视化一次
  num_vis_samples: 10  # 可视化样本数量
  use_tensorboard: true
