# GAGeo configuration
# Unified backbone architecture with token injection + attention masks

# Data
data:
  train_json: "${JSON_ROOT}/train_all.json"
  val_json: "${JSON_ROOT}/val_all.json"
  data_root: "${DATA_ROOT}"
  img_size: 518
  crop_size: 518
  num_workers: 24
  # Dataset split:
  # all | drone_to_satellite (d2s) | ground_to_satellite (g2s)
  train_subset: all
  val_subset: all
  # Legacy fields kept for backward compatibility with older scripts.
  train_direction: 'mono_to_sat'
  val_direction: 'mono_to_sat'

# Model
model:
  # Pi3 backbone settings
  decoder_size: 'large'  # 'small', 'base', 'large'

  # Token injection settings
  # Total learnable queries = num_bbox_mask_queries + num_heatmap_queries.
  # Keep num_learnable_tokens for backward compatibility with old scripts.
  num_bbox_mask_queries: 1
  num_heatmap_queries: 1
  num_learnable_tokens: 2

  # Training switches
  use_deep_supervision: true
  use_contrastive_loss: true

  # Deep supervision (0-indexed pair-layers: one local+global = one layer)
  supervision_layers: [4, 11, 17]  # Early, Mid, Late
  supervision_weights: [0.1, 0.3, 0.6]  # Increasing weights

  # Pi3 pretrained weights
  pi3_weights: "${CHECKPOINT_DIR}/pi3_model.safetensors"
  freeze_encoder: true  # Freeze visual encoder
  freeze_decoder: false  # Pi3 decoder trainable (with low LR)
  freeze_prompt_encoder: true  # Freeze SAM prompt encoder (keep projections trainable)
  freeze_mask_conv: true  # Freeze SAM mask downscaling conv layers
  load_camera_head_weights: true  # Load Pi3 camera head pretrained weights

  # SAM2 pretrained weights
  sam_weights: "${CHECKPOINT_DIR}/sam2.1_hiera_large.pt"
  sam_embed_dim: 256  # SAM internal dimension

  # Contrastive (MoCo-style)
  contrastive: true
  contrastive_proj_dim: 256
  contrastive_queue_size: 16384
  contrastive_momentum: 0.999
  contrastive_temperature: 0.07

  # Dropout
  dropout: 0.1
  # Mask injection strategy:
  # - global_kv: inject dense mask embedding only into global-attn K (default)
  # - pre_backbone: inject dense mask embedding to front tokens before decoder
  mask_inject_mode: global_kv
  # Global attention mask switch
  use_global_attn_mask: true

# Training
training:
  batch_size: 3
  gradient_accumulation_steps: 4
  num_epochs: 30

  # 3-group learning rate strategy
  lr_backbone: 1.0e-5     # Low LR: Pi3 encoder + decoder (pretrained)
  lr_new_tokens: 5.0e-4   # Mid LR: Learnable queries, intermediate projections, prompt projections
  lr_heads: 1.0e-4        # High LR: Task heads + intermediate supervision heads
  weight_decay: 1.0e-4

  # Loss weights (final predictions)
  weight_bbox: 5.0
  weight_giou: 2.0
  weight_mask_bce: 2.0    # SAM-style mask BCE loss
  weight_mask_dice: 5.0   # SAM-style mask Dice loss
  weight_heatmap: 0.1
  weight_rotation: 0.1
  weight_contrastive: 0.1
  weight_class: 2.0

  # Pose-related supervision switches
  use_rot_pos_supervision: true
  use_heatmap_loss: true

  # Rotation Loss
  smooth_rotation: true

  # Hungarian Matcher
  matcher_cost_class: 1.0
  matcher_cost_bbox: 5.0
  matcher_cost_giou: 2.0

  # Optimizer
  optimizer: "adamw"

  # Scheduler
  scheduler: "cosine"
  warmup_epochs: 5
  min_lr: 1.0e-6

  # Gradient clipping
  grad_clip: 1.0

  # Mixed precision (bf16 for RTX 5090)
  use_amp: true
  mixed_precision: bf16
  gpu: "0,1,2,3,4,5,6,7"

  # Speed optimizations
  compile_encoder: false         # Multi-GPU/DeepSpeed may hit inductor(triton) cache issues
  gradient_checkpointing: false  # Enable to save VRAM and allow larger batch_size

# Checkpointing
checkpoint:
  output_dir: "${OUTPUT_ROOT}"
  save_freq: 5
  resume: null

# Logging
logging:
  log_freq: 50
  val_freq: 1
  use_wandb: true
  wandb_project: "gageo"
  use_tensorboard: false

  visualize: true
  vis_samples: 10
  vis_prompt_types: ['point', 'bbox', 'mask']
