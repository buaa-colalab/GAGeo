# GAGeo-2D ablation: DINOv2-g/14 + cross-view adapter.
# Main trial is full fine-tuning to test whether a very large 2D SSL backbone
# alone can explain GAGeo-Pi3 performance under the same task-token decoding.

data:
  train_json: "/mnt/data/wrp/eccv_data/data/json/train_all.json"
  val_json: "/mnt/data/wrp/eccv_data/data/json/val_all.json"
  data_root: "/mnt/data/wrp/eccv_data/data/urban"
  img_size: 518
  crop_size: 518
  num_workers: 24
  train_subset: all
  val_subset: all
  train_direction: 'mono_to_sat'
  val_direction: 'mono_to_sat'

model:
  version: 'v3'
  backbone_type: '2d_cva'
  encoder_name: 'dinov2_g14'
  encoder_pretrained: true
  encoder_weights: 'LVD142M'
  patch_size: 14
  adapter_dim: 1024
  adapter_depth: 6
  adapter_num_heads: 16
  decoder_size: 'large'
  use_spatial_bbox_head: true

  num_bbox_mask_queries: 1
  num_heatmap_queries: 1
  num_learnable_tokens: 2
  use_deep_supervision: false
  use_contrastive_loss: true
  supervision_layers: [2]
  supervision_weights: [1.0]

  pi3_weights: null
  freeze_encoder: false
  freeze_dinov2: false
  freeze_decoder: false
  freeze_prompt_encoder: true
  freeze_mask_conv: true
  load_camera_head_weights: false

  sam_weights: "/mnt/data/wrp/GaGeo/ckpt/sam2.1_hiera_large.pt"
  sam_embed_dim: 256

  contrastive: true
  contrastive_proj_dim: 256
  contrastive_queue_size: 16384
  contrastive_momentum: 0.999
  contrastive_temperature: 0.07

  dropout: 0.1
  mask_inject_mode: global_kv
  use_global_attn_mask: true

training:
  batch_size: 6
  gradient_accumulation_steps: 12
  num_epochs: 30
  lr_backbone: 1.0e-5
  lr_new_tokens: 5.0e-4
  lr_heads: 1.0e-4
  weight_decay: 1.0e-4

  weight_bbox: 5.0
  weight_giou: 2.0
  weight_mask_bce: 2.0
  weight_mask_dice: 5.0
  weight_heatmap: 0.1
  weight_rotation: 0.1
  weight_contrastive: 0.1
  weight_class: 2.0

  use_rot_pos_supervision: true
  use_heatmap_loss: true
  smooth_rotation: true
  matcher_cost_class: 1.0
  matcher_cost_bbox: 5.0
  matcher_cost_giou: 2.0
  optimizer: "adamw"
  scheduler: "cosine"
  warmup_epochs: 5
  min_lr: 1.0e-6
  grad_clip: 1.0
  use_amp: true
  mixed_precision: bf16
  gpu: "0,1,2,3,4,5,6,7"
  compile_encoder: false
  gradient_checkpointing: true

checkpoint:
  output_dir: "/mnt/data/wrp/location_v4/output_v3"
  save_freq: 5
  resume: null

logging:
  log_freq: 50
  val_freq: 1
  use_tensorboard: true
  visualize: true
  vis_samples: 10
  vis_prompt_types: ['point', 'bbox', 'mask']
