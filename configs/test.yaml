# Overfit Test Configuration - 在单样本上过拟合测试模型

data:
  train_json: "/data/xhj/location/data/single.json"
  val_json: "/data/xhj/location/data/single.json"
  data_root: "/data/GoogleEarth"
  img_size: 518
  crop_size: 518
  num_workers: 2

model:
  embed_dim: 1024
  vggt_depth: 24
  num_heads: 16
  num_decoder_layers: 6
  enable_bbox: true
  enable_seg: false
  enable_camera: true
  enable_position: true
  vggt_weights: /data/xhj/location/ckpt/vggt/model.pt
  dinov2_weights: null
  freeze_patch_embed: true
  freeze_aggregator: true

training:
  batch_size: 1
  gradient_accumulation_steps: 1
  num_epochs: 200
  
  # 过拟合测试：使用较大学习率快速收敛
  lr_backbone: 1.0e-4
  lr_heads: 1.0e-3
  weight_decay: 0.0
  
  weight_bbox: 5.0
  weight_giou: 2.0
  weight_yaw: 1.0
  weight_position: 1.0
  weight_mask: 1.0
  
  optimizer: "adamw"
  scheduler: "cosine"
  warmup_epochs: 0
  min_lr: 1.0e-6
  grad_clip: 1.0
  
  use_amp: true
  mixed_precision: bf16

  gpu: "5,6"

checkpoint:
  output_dir: "./output/overfit_test"
  save_freq: 20
  resume: null

logging:
  val_freq: 1
  use_tensorboard: true

