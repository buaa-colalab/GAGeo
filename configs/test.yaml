# Overfit Test Configuration - 在单样本上过拟合测试模型

data:
  train_json: "/data/xhj/location/data/single.json"
  val_json: "/data/xhj/location/data/single.json"
  data_root: "/data/GoogleEarth"
  img_size: 518
  crop_size: 518
  num_workers: 2

model:
  # Pi3 backbone settings
  decoder_size: 'large'  # 'small', 'base', 'large'
  
  # Two-Stage Cross-Attention 参数
  num_intent_queries: 32
  num_object_queries: 10
  num_location_queries: 16
  
  # Transformer 参数
  num_heads: 8
  prompt_fusion_layers: 3
  num_decoder_layers: 6
  dropout: 0.1
  
  # Pi3 预训练权重
  pi3_weights: "/shared3/data/xhj/location/ckpt/pi3/model.safetensors"
  freeze_dinov2: true
  freeze_decoder: false

training:
  batch_size: 1
  gradient_accumulation_steps: 1
  num_epochs: 200
  
  # 过拟合测试：使用较大学习率快速收敛
  lr_backbone: 1.0e-4
  lr_heads: 1.0e-3
  weight_decay: 0.0
  
  weight_bbox: 5.0
  weight_giou: 2.0
  weight_yaw: 1.0
  weight_heatmap: 1.0
  
  optimizer: "adamw"
  scheduler: "cosine"
  warmup_epochs: 0
  min_lr: 1.0e-6
  grad_clip: 1.0
  
  use_amp: true
  mixed_precision: bf16

  gpu: "5,6"

checkpoint:
  output_dir: "./output/overfit_test"
  save_freq: 20
  resume: null

logging:
  val_freq: 1
  use_tensorboard: true
  
  # 可视化设置
  visualize: true
  vis_samples: 5  # 过拟合测试用较少样本
  vis_prompt_types: ['point']  # 过拟合测试只用point

