# Test Configuration - 用于测试训练链路

data:
  train_json: "/data/xhj/location/data/test_samples.json"
  val_json: "/data/xhj/location/data/test_samples.json"
  data_root: "/data/GoogleEarth"
  img_size: 518
  crop_size: 518
  num_workers: 4  # 增加worker数量避免主进程阻塞

model:
  embed_dim: 1024
  vggt_depth: 24
  num_heads: 16
  num_decoder_layers: 6
  enable_bbox: true
  enable_seg: false
  enable_camera: true
  enable_position: true
  #vggt_weights: /data/xhj/location/ckpt/vggt/model.pt
  vggt_weights: null
  dinov2_weights: /data/xhj/location/ckpt/dino_v2_l/pytorch_model.bin  # 例如: ckpt/dinov2_vitl14_reg.pth
  freeze_patch_embed: true   # 冻结DINOv2 patch embedding (~300M参数)
  freeze_aggregator: false    # 冻结VGGT aggregator (~1.2B参数)

training:
  batch_size: 1  # 减小batch size以降低显存占用
  num_epochs: 2
  lr_backbone: 1.0e-5
  lr_heads: 1.0e-4
  weight_decay: 1.0e-4
  weight_bbox: 5.0
  weight_giou: 2.0
  weight_yaw: 1.0
  weight_position: 1.0
  weight_mask: 1.0
  warmup_epochs: 1
  min_lr: 1.0e-6
  grad_clip: 1.0
  use_amp: true  # 禁用混合精度以避免FP16类型不匹配
  gpu: "5,6,7"  # GPU设备ID，可以是 "0", "1", "0,1,2,3" 等，null表示使用所有可用GPU

checkpoint:
  output_dir: "./output/test"
  save_freq: 1
  resume: null

logging:
  use_wandb: false
  use_tensorboard: true
  log_freq: 10
  val_freq: 1

