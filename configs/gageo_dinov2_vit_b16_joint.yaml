# 2D-GAGeo redesign: GAGeo DINOv2-L encoder + ImageNet ViT-B joint fusion.
# The ViT-B transformer consumes concatenated DINOv2 patch features; it does
# not use ViT patch embedding or Pi3's alternating local/global decoder.

data:
  train_json: "${JSON_ROOT}/train_all.json"
  val_json: "${JSON_ROOT}/val_all.json"
  data_root: "${DATA_ROOT}"
  img_size: 518
  crop_size: 518
  num_workers: 24
  train_subset: all
  val_subset: all
  train_direction: 'mono_to_sat'
  val_direction: 'mono_to_sat'

model:
  version: 'v3'
  backbone_type: 'dinov2_joint_vit'
  encoder_name: 'vit_b16'
  joint_vit_variant: 'vit_b16'
  encoder_pretrained: true
  encoder_weights: 'IMAGENET1K_V1'
  joint_vit_weights: "${CHECKPOINT_DIR}/vit_b_16_imagenet1k_v1.pth"
  patch_size: 14
  decoder_size: 'large'
  use_spatial_bbox_head: true

  num_bbox_mask_queries: 1
  num_heatmap_queries: 1
  num_learnable_tokens: 2
  use_deep_supervision: false
  use_contrastive_loss: true
  supervision_layers: []
  supervision_weights: []

  # Only the DINOv2 encoder keys are loaded from this checkpoint.
  pi3_weights: "${CHECKPOINT_DIR}/pi3_model.safetensors"
  # Match GAGeo: freeze the DINOv2 visual encoder, train the fusion ViT and heads.
  freeze_encoder: true
  freeze_dinov2: true
  freeze_decoder: false
  freeze_prompt_encoder: true
  freeze_mask_conv: true
  load_camera_head_weights: false

  sam_weights: "${CHECKPOINT_DIR}/sam2.1_hiera_large.pt"
  sam_embed_dim: 256

  contrastive: true
  contrastive_proj_dim: 256
  contrastive_queue_size: 16384
  contrastive_momentum: 0.999
  contrastive_temperature: 0.07

  dropout: 0.1
  mask_inject_mode: pre_backbone
  use_global_attn_mask: false

training:
  batch_size: 24
  gradient_accumulation_steps: 4
  num_epochs: 30
  lr_backbone: 1.0e-5
  lr_new_tokens: 5.0e-4
  lr_heads: 1.0e-4
  weight_decay: 1.0e-4

  weight_bbox: 5.0
  weight_giou: 2.0
  weight_mask_bce: 2.0
  weight_mask_dice: 5.0
  weight_heatmap: 0.1
  weight_rotation: 0.1
  weight_contrastive: 0.1
  weight_class: 2.0

  use_rot_pos_supervision: true
  use_heatmap_loss: true
  smooth_rotation: true
  matcher_cost_class: 1.0
  matcher_cost_bbox: 5.0
  matcher_cost_giou: 2.0
  optimizer: "adamw"
  scheduler: "cosine"
  warmup_epochs: 5
  min_lr: 1.0e-6
  grad_clip: 1.0
  use_amp: true
  mixed_precision: bf16
  gpu: "0,1,2,3,4,5,6,7"
  compile_encoder: false
  gradient_checkpointing: false

checkpoint:
  output_dir: "${OUTPUT_ROOT}/gageo_dinov2_vit_b16_joint"
  save_freq: 5
  resume: "${OUTPUT_ROOT}/gageo_dinov2_vit_b16_joint/best"

logging:
  log_freq: 10
  val_freq: 1
  use_wandb: true
  wandb_project: "location_v4"
  use_tensorboard: false
  visualize: false
  vis_samples: 10
  vis_prompt_types: ['point', 'bbox', 'mask']
