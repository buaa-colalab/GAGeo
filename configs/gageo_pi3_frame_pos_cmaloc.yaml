# GAGeo Pi3 + frame-wise positional embedding ablation.
# Same CMA-Loc training setup as default_v3; only use_frame_pos_embed is enabled.

data:
  train_json: "${JSON_ROOT}/train_all.json"
  val_json: "${JSON_ROOT}/val_all.json"
  data_root: "${DATA_ROOT}"
  img_size: 518
  crop_size: 518
  num_workers: 24
  train_subset: all
  val_subset: all
  train_direction: 'mono_to_sat'
  val_direction: 'mono_to_sat'

model:
  version: 'v3'
  backbone_type: 'pi3'

  decoder_size: 'large'
  patch_size: 14

  num_bbox_mask_queries: 1
  num_heatmap_queries: 1
  num_learnable_tokens: 2

  use_deep_supervision: true
  use_contrastive_loss: true
  supervision_layers: [4, 11, 17]
  supervision_weights: [0.1, 0.3, 0.6]

  pi3_weights: "${CHECKPOINT_DIR}/pi3_model.safetensors"
  freeze_dinov2: true
  freeze_decoder: false
  freeze_prompt_encoder: true
  freeze_mask_conv: true
  load_camera_head_weights: true

  sam_weights: "${CHECKPOINT_DIR}/sam2.1_hiera_large.pt"
  sam_embed_dim: 256

  contrastive: true
  contrastive_proj_dim: 256
  contrastive_queue_size: 16384
  contrastive_momentum: 0.999
  contrastive_temperature: 0.07

  dropout: 0.1
  mask_inject_mode: global_kv
  use_global_attn_mask: true

  # Learned [satellite, front] role embeddings are added after DINOv2 tokens
  # enter the Pi3 decoder, breaking the original joint-view permutation symmetry.
  use_frame_pos_embed: true

training:
  batch_size: 64
  gradient_accumulation_steps: 4
  num_epochs: 30

  lr_backbone: 1.0e-5
  lr_new_tokens: 5.0e-4
  lr_heads: 1.0e-4
  weight_decay: 1.0e-4

  weight_bbox: 5.0
  weight_giou: 2.0
  weight_mask_bce: 2.0
  weight_mask_dice: 5.0
  weight_heatmap: 0.1
  weight_rotation: 0.1
  weight_contrastive: 0.1
  weight_class: 2.0

  use_rot_pos_supervision: true
  use_heatmap_loss: true

  smooth_rotation: true

  matcher_cost_class: 1.0
  matcher_cost_bbox: 5.0
  matcher_cost_giou: 2.0

  optimizer: "adamw"
  scheduler: "cosine"
  warmup_epochs: 5
  min_lr: 1.0e-6
  grad_clip: 1.0

  use_amp: true
  mixed_precision: bf16
  gpu: "0,1,2,3,4,5,6,7"

  compile_encoder: false
  gradient_checkpointing: false

checkpoint:
  output_dir: "${OUTPUT_ROOT}/gageo_pi3_frame_pos_cmaloc"
  save_freq: 5
  resume: null

logging:
  log_freq: 10
  val_freq: 1
  use_tensorboard: true

  visualize: false
  vis_samples: 10
  vis_prompt_types: ['point', 'bbox', 'mask']
